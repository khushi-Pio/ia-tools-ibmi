name: Improvement
description: Suggest an enhancement to an existing tool
labels: ["improvement"]
body:
  - type: dropdown
    id: tool
    attributes:
      label: Tool Name
      description: Which tool should be improved?
      options:
        - ia_where_used
        - ia_call_hierarchy
        - ia_field_impact
        - ia_program_variables
        - ia_data_structures
        - ia_call_parameters
        - ia_subroutines
        - ia_file_overrides
        - ia_file_fields
        - ia_object_list
        - ia_program_info
        - ia_program_summary
        - ia_program_detail
        - ia_source_code
        - ia_rpg_source_tokens
        - ia_cl_source_tokens
        - ia_dashboard
        - ia_repo_config
        - ia_exception_log
        - ia_dds_to_ddl_status
        - ia_reference_count
        - ia_unused_objects
        - ia_circular_deps
        - ia_override_chain
        - ia_object_lifecycle
        - ia_code_complexity
        - ia_library_files
        - ia_object_lookup
        - ia_file_dependencies
        - ia_uncompiled_sources
        - ia_copybook_impact
        - ia_member_copybooks
        - ia_srvpgm_exports
        - ia_procedure_xref
        - ia_procedure_params
        - ia_cl_jobs
        - ia_variable_ops
        - ia_klist_usage
        - ia_application_area
        - ia_sql_names
        - ia_program_files
        - ia_rpg_source
        - ia_rpg_source_search
        - ia_rpg_source_stats
        - ia_member_lookup
        - ia_object_references
        - ia_obj_size
        - execute_sql
        - describe_sql_object
    validations:
      required: true

  - type: textarea
    id: change
    attributes:
      label: What should change?
      description: Describe the improvement
      placeholder: "Add a new parameter to filter by object type..."
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why is this useful?
      description: How would this help users?
      placeholder: "Currently I have to manually filter the results, which is tedious when..."
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other details or examples
    validations:
      required: false
