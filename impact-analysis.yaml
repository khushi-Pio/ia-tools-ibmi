# Impact Analysis (iA) Tools for IBM i
# Source: programmers.io ia-mcp-server — 44 tools for code impact analysis
# These tools query the iA repository tables (pre-parsed IBM i source metadata).
#
# IMPORTANT: The library is configured via the IA_LIBRARY environment variable.
# Default iA library: IADEMODEV (set IA_LIBRARY in .env to override).
#
# Tables queried: IAALLREFPF, IAPGMCALLS, IAFILEDTL, IAPGMVARS, IAPGMDS,
#   IACALLPARM, IASUBRDTL, IAOVRPF, IAPGMINF, IAPGMREF, IACPGMREF,
#   OBJECT_DETAILS, IA_DASHBOARD_DETAIL, REPO_CONFIGURATION, IAEXCPLOG,
#   DDSTODDL_FILE_CONVERSION_DETAILS, IAOBJMAP, IAOBJECT, IA_CODE_INFO,
#   IADSPDBR, QSYS2.SYSTABLES, IAQRPGSRC, IAMEMBER

sources:
  ibmi:
    host: ${DB2i_HOST}
    user: ${DB2i_USER}
    password: "${DB2i_PASS}"
    port: ${DB2i_PORT}
    ignore-unauthorized: true

tools:

  # ── 1. Where Used — find all objects referencing a given object ──────────
  ia_where_used:
    name: ia-where-used
    source: ibmi
    maxDisplayRows: 1000
    description: >
      Find every program, service program, command, display file, and logical file
      that references a specific object. Most common impact analysis query.
      Use before modifying or deleting any object to understand the blast radius.
      Queries the iA IAALLREFPF cross-reference table (richer than DSPPGMREF).
    parameters:
      - name: object_name
        type: string
        description: "IBM i object name to search for (e.g., ORDERFILE, CUSTPGM)"
        required: true
        minLength: 1
        maxLength: 10
      - name: object_type
        type: string
        description: "Filter by type: *ALL, *PGM, *SRVPGM, *FILE, *DSPF, *CMD (default: *ALL)"
        required: false
        default: "*ALL"
      - name: limit
        type: integer
        description: "Max results (default: 200)"
        required: false
        default: 200
        min: 1
        max: 5000
    statement: |
      SELECT DISTINCT
        OBJECT_NAME AS using_object,
        OBJECT_TYPE AS using_type,
        OBJECT_ATTR AS using_attr,
        REFERENCED_OBJ AS referenced_object,
        REFERENCED_OBJTYP AS referenced_type,
        MAPED_FROM AS reference_source
      FROM ${IA_LIBRARY}.IAALLREFPF
      WHERE REFERENCED_OBJ = :object_name
        AND (:object_type = '*ALL' OR REFERENCED_OBJTYP = :object_type)
      ORDER BY OBJECT_TYPE, OBJECT_NAME
      FETCH FIRST :limit ROWS ONLY

  # ── 2. Call Hierarchy — program call tree (callers/callees/both) ────────
  ia_call_hierarchy:
    name: ia-call-hierarchy
    source: ibmi
    maxDisplayRows: 1000
    description: >
      Generate the call tree for a program — who calls it (CALLERS), what it calls
      (CALLEES), or both. Includes procedure-level detail and call sequence numbers.
      Queries IAPGMCALLS — captures CALL, CALLP, and bound module references.
    parameters:
      - name: program_name
        type: string
        description: "Program or module name"
        required: true
        minLength: 1
        maxLength: 10
      - name: direction
        type: string
        description: "CALLERS, CALLEES, or BOTH (default: BOTH)"
        required: false
        default: "BOTH"
      - name: limit
        type: integer
        description: "Max results (default: 200)"
        required: false
        default: 200
        min: 1
        max: 5000
    statement: |
      SELECT
        'CALLEES' AS direction,
        MBR_NAME AS source_program,
        CALLED_OBJCT AS target_program,
        FROM_PROC AS calling_procedure,
        CALLED_PROC AS called_procedure,
        CALL_SEQ AS call_sequence
      FROM ${IA_LIBRARY}.IAPGMCALLS
      WHERE MBR_NAME = :program_name
        AND :direction IN ('CALLEES', 'BOTH')
      UNION ALL
      SELECT
        'CALLERS' AS direction,
        MBR_NAME AS source_program,
        CALLED_OBJCT AS target_program,
        FROM_PROC AS calling_procedure,
        CALLED_PROC AS called_procedure,
        CALL_SEQ AS call_sequence
      FROM ${IA_LIBRARY}.IAPGMCALLS
      WHERE CALLED_OBJCT = :program_name
        AND :direction IN ('CALLERS', 'BOTH')
      ORDER BY direction, call_sequence
      FETCH FIRST :limit ROWS ONLY

  # ── 3. Field Impact — blast radius of changing a field ──────────────────
  ia_field_impact:
    name: ia-field-impact
    source: ibmi
    maxDisplayRows: 1000
    description: >
      Analyze the blast radius of changing a specific field in a database file.
      Returns all programs that reference the file, cross-referenced with field-level usage.
      Critical before any field-level schema change (resize, rename, retype).
      Combines IAALLREFPF (cross-references) with IAFILEDTL (field details).
    parameters:
      - name: file_name
        type: string
        description: "Physical or logical file name (e.g., ORDERFILE)"
        required: true
        minLength: 1
        maxLength: 10
      - name: field_name
        type: string
        description: "Field name to analyze (e.g., CUSTNO)"
        required: true
        minLength: 1
        maxLength: 10
      - name: limit
        type: integer
        description: "Max results (default: 500)"
        required: false
        default: 500
        min: 1
        max: 5000
    statement: |
      SELECT DISTINCT
        ref.OBJECT_NAME AS affected_object,
        ref.OBJECT_TYPE AS object_type,
        ref.OBJECT_ATTR AS object_attr,
        ref.MAPED_FROM AS reference_type,
        fld.FIELD_DATA_TYPE AS field_type,
        fld.FIELD_USE_MODE AS field_usage
      FROM ${IA_LIBRARY}.IAALLREFPF ref
      LEFT JOIN ${IA_LIBRARY}.IAFILEDTL fld
        ON fld.MEMBER_NAME = ref.OBJECT_NAME
        AND fld.FIELD_NAME_INTERNAL = :field_name
      WHERE ref.REFERENCED_OBJ = :file_name
      ORDER BY ref.OBJECT_TYPE, ref.OBJECT_NAME
      FETCH FIRST :limit ROWS ONLY

  # ── 4. Program Variables — all variables declared in a program ──────────
  ia_program_variables:
    name: ia-program-variables
    source: ibmi
    maxDisplayRows: 1000
    description: >
      List all variables declared in a program/module with full type information.
      Includes standalone fields, data structure subfields, indicators, and constants.
      Queries IAPGMVARS — parsed from source code by iA's RPG/CL parser.
    parameters:
      - name: member_name
        type: string
        description: "Source member name (e.g., ORDHIST)"
        required: true
        minLength: 1
        maxLength: 10
      - name: limit
        type: integer
        description: "Max results (default: 500)"
        required: false
        default: 500
        min: 1
        max: 5000
    statement: |
      SELECT
        IAV_VAR AS variable_name,
        IAV_TYP AS variable_type,
        IAV_DTYP AS data_type,
        IAV_LEN AS field_length,
        IAV_DEC AS decimal_positions,
        IAV_DIM AS array_dimension
      FROM ${IA_LIBRARY}.IAPGMVARS
      WHERE IAV_MBR = :member_name
      ORDER BY IAV_VAR
      FETCH FIRST :limit ROWS ONLY

  # ── 5. Data Structures — DS definitions with subfields ──────────────────
  ia_data_structures:
    name: ia-data-structures
    source: ibmi
    maxDisplayRows: 1000
    description: >
      Get all data structure definitions in a program, including nested DS, based DS,
      qualified DS, and their subfields with positional info.
      Queries IAPGMDS — parsed from D-specs and free-format DCL-DS.
    parameters:
      - name: member_name
        type: string
        description: "Source member name"
        required: true
        minLength: 1
        maxLength: 10
      - name: limit
        type: integer
        description: "Max results (default: 500)"
        required: false
        default: 500
        min: 1
        max: 5000
    statement: |
      SELECT
        DATASTR_NAME AS ds_name,
        DS_FLD_NAME AS field_name,
        DS_FLD_TYPE AS field_type,
        FROM_LEN_FLD AS from_position,
        TO_LEN_FLD AS to_position,
        DS_FLD_RANK AS field_rank,
        DS_BASED_NAM AS based_on,
        DS_QUALFLG AS qualified_flag
      FROM ${IA_LIBRARY}.IAPGMDS
      WHERE MEMBER_NAME = :member_name
      ORDER BY DATASTR_NAME, DS_FLD_RANK
      FETCH FIRST :limit ROWS ONLY

  # ── 6. Call Parameters — parameters passed to external calls ────────────
  ia_call_parameters:
    name: ia-call-parameters
    source: ibmi
    description: >
      Get parameter details for all external calls made by a program.
      Shows what data is passed to each called program/procedure.
      Queries IACALLPARM — parameter names, types, and lengths.
    parameters:
      - name: member_name
        type: string
        description: "Source member of the calling program"
        required: true
        minLength: 1
        maxLength: 10
      - name: limit
        type: integer
        description: "Max results (default: 500)"
        required: false
        default: 500
        min: 1
        max: 5000
    statement: |
      SELECT
        CALLED_OBJECT AS called_program,
        PARM_NAME AS parameter_name,
        PARM_TYPE AS parameter_type,
        PARM_LENGTH AS parameter_length,
        CALL_SEQ AS call_sequence
      FROM ${IA_LIBRARY}.IACALLPARM
      WHERE MBR_NAME = :member_name
      ORDER BY CALLED_OBJECT, CALL_SEQ
      FETCH FIRST :limit ROWS ONLY

  # ── 7. Subroutines — BEGSR/ENDSR details with usage counts ─────────────
  ia_subroutines:
    name: ia-subroutines
    source: ibmi
    maxDisplayRows: 1000
    description: >
      List all subroutines (BEGSR/ENDSR) in a program with usage counts.
      Helps understand internal program structure and identify dead subroutines.
      Queries IASUBRDTL — EXSR/BEGSR mapping with line numbers.
    parameters:
      - name: member_name
        type: string
        description: "Source member name"
        required: true
        minLength: 1
        maxLength: 10
      - name: limit
        type: integer
        description: "Max results (default: 200)"
        required: false
        default: 200
        min: 1
        max: 5000
    statement: |
      SELECT
        SR_SBR_NAME AS subroutine_name,
        SR_OPCODE AS opcode,
        SR_CNT AS usage_count,
        MBR_RRN AS line_number
      FROM ${IA_LIBRARY}.IASUBRDTL
      WHERE MBR_NAME = :member_name
      ORDER BY SR_SBR_NAME
      FETCH FIRST :limit ROWS ONLY

  # ── 8. File Overrides — OVRDBF statements (file routing) ───────────────
  ia_file_overrides:
    name: ia-file-overrides
    source: ibmi
    description: >
      Get all OVRDBF (Override with Database File) statements. Critical for
      understanding actual file routing vs. what is declared in F-specs.
      File overrides can silently redirect I/O to different files.
      Pass '*ALL' for member_name to see all overrides across all members.
      Queries IAOVRPF.
    parameters:
      - name: member_name
        type: string
        description: "Source member name, or '*ALL' for all overrides"
        required: false
        default: "*ALL"
        maxLength: 10
      - name: limit
        type: integer
        description: "Max results (default: 200)"
        required: false
        default: 200
        min: 1
        max: 5000
    statement: |
      SELECT
        IOVR_MBR AS member_name,
        IOVR_FROM AS from_file,
        IOVR_TO AS to_file,
        IOVR_SCP AS override_scope,
        IOVR_RRN AS line_number
      FROM ${IA_LIBRARY}.IAOVRPF
      WHERE (:member_name = '*ALL' OR IOVR_MBR = :member_name)
      ORDER BY IOVR_MBR, IOVR_RRN
      FETCH FIRST :limit ROWS ONLY

  # ── 9. File Fields — field-level metadata for a database file ───────────
  ia_file_fields:
    name: ia-file-fields
    source: ibmi
    description: >
      Get field-level metadata for a database file: internal names, data types,
      reference files, usage mode, and record formats. Richer than DSPFFD because
      it includes iA parsed cross-reference data. Queries IAFILEDTL.
    parameters:
      - name: file_name
        type: string
        description: "Database file name"
        required: true
        minLength: 1
        maxLength: 10
      - name: limit
        type: integer
        description: "Max results (default: 500)"
        required: false
        default: 500
        min: 1
        max: 5000
    statement: |
      SELECT
        FILE_NAME,
        FIELD_NAME_INTERNAL AS internal_name,
        FIELD_DATA_TYPE AS data_type,
        REF_FILE AS reference_file,
        FIELD_USE_MODE AS usage_mode,
        RECORD_FORMAT AS record_format
      FROM ${IA_LIBRARY}.IAFILEDTL
      WHERE FILE_NAME = :file_name
      ORDER BY FIELD_NAME_INTERNAL
      FETCH FIRST :limit ROWS ONLY

  # ── 10. Object List — repository inventory by type ──────────────────────
  ia_object_list:
    name: ia-object-list
    source: ibmi
    description: >
      List all objects in the iA repository with metadata: type, attribute, library,
      source file/member, creation date, and exclusion status.
      Use to discover available objects before running impact analysis.
      Queries OBJECT_DETAILS — the master object inventory.
    parameters:
      - name: object_type
        type: string
        description: "Filter: *ALL, *PGM, *SRVPGM, *FILE, *DSPF, *CMD, *DTAARA, *MODULE (default: *ALL)"
        required: false
        default: "*ALL"
      - name: object_attribute
        type: string
        description: "Filter by attribute: *ALL, RPGLE, CLLE, RPG, CLP, CLE, PF, LF, DSPF, PRTF (default: *ALL)"
        required: false
        default: "*ALL"
      - name: limit
        type: integer
        description: "Max results (default: 500)"
        required: false
        default: 500
        min: 1
        max: 5000
    statement: |
      SELECT
        OBJECT_NAME, OBJECT_TYPE, OBJECT_ATTRIBUTE, OBJECT_LIBRARY,
        SOURCE_FILE, SOURCE_MEMBER,
        CREATION_DATE, EXCLUDED_FLAG
      FROM ${IA_LIBRARY}.OBJECT_DETAILS
      WHERE (:object_type = '*ALL' OR OBJECT_TYPE = :object_type)
        AND (:object_attribute = '*ALL' OR OBJECT_ATTRIBUTE = :object_attribute)
      ORDER BY OBJECT_TYPE, OBJECT_ATTRIBUTE, OBJECT_NAME
      FETCH FIRST :limit ROWS ONLY

  # ── 11. Program Info — program/module metadata ──────────────────────────
  ia_program_info:
    name: ia-program-info
    source: ibmi
    description: >
      Get detailed metadata for a program or module: source file, member,
      attributes, and last change date. Queries IAPGMINF.
    parameters:
      - name: program_name
        type: string
        description: "Program or module name"
        required: true
        minLength: 1
        maxLength: 10
    statement: |
      SELECT
        PGM_NAME, MOD_NAME, SRC_FILE, SRC_MBR,
        MOD_ATTRIB, SRC_UPDDATE
      FROM ${IA_LIBRARY}.IAPGMINF
      WHERE PGM_NAME = :program_name OR MOD_NAME = :program_name

  # ── 12. Program Summary — quick program overview ──────────────────────────
  ia_program_summary:
    name: ia-program-summary
    source: ibmi
    description: >
      Quick overview of a program — metadata, compile info, and complexity metrics.
      Provides a concise summary in a single query. Queries IAPGMINF, IA_CODE_INFO,
      and IASRCMBRID.
    parameters:
      - name: program_name
        type: string
        description: "Program or module name (max 10)"
        required: true
        minLength: 1
        maxLength: 10
      - name: limit
        type: integer
        description: "Max results (default: 100)"
        required: false
        default: 100
        min: 1
        max: 5000
    statement: |
      SELECT
        i.PGM_NAME,
        i.PGM_LIB,
        i.PGM_TYP,
        i.MOD_NAME,
        i.MOD_ATTRIB,
        i.SRC_FILE,
        i.SRC_LIB,
        i.SRC_MBR,
        i.MOD_CRTDATE,
        i.SRC_UPDDATE,
        i.TGT_RLS,
        c.TOTAL_LINES,
        c.EXEC_LINES,
        c.IF_COUNT,
        c.DO_COUNT,
        c.SQL_COUNT,
        c.GOTO_COUNT,
        c.CALL_PGM_COUNT,
        c.CALLED_BY_PGM AS called_by_count,
        m.MBR_TTL_LOC AS total_lines_src,
        m.MBR_CMT_LOC AS comment_lines,
        m.MBR_BLNK_LOC AS blank_lines,
        m.MEMBER_TYPE AS source_type
      FROM ${IA_LIBRARY}.IAPGMINF i
      LEFT JOIN ${IA_LIBRARY}.IA_CODE_INFO c
        ON c.MEMBER_NAME = i.SRC_MBR
      LEFT JOIN ${IA_LIBRARY}.IASRCMBRID m
        ON m.MEMBER_NAME = i.SRC_MBR
      WHERE i.PGM_NAME = :program_name
        OR i.MOD_NAME = :program_name
      ORDER BY i.MOD_TYP, i.MOD_NAME
      FETCH FIRST :limit ROWS ONLY

  # ── 13. Program Detail — deep structural analysis ─────────────────────────
  ia_program_detail:
    name: ia-program-detail
    source: ibmi
    maxDisplayRows: 1000
    description: >
      Deep structural analysis of a program — calls, files, subroutines, variables,
      overrides, and call parameters in a single query. Use section parameter to
      filter specific areas. Queries IAPGMCALLS, IAALLREFPF, IASUBRDTL, IAPGMVARS,
      IAOVRPF, and IACALLPARM.
    parameters:
      - name: program_name
        type: string
        description: "Program or module name (max 10)"
        required: true
        minLength: 1
        maxLength: 10
      - name: section
        type: string
        description: "Section filter: *ALL, CALLS, FILES, SUBROUTINES, VARIABLES, OVERRIDES, CALL_PARAMS (default: *ALL)"
        required: false
        default: "*ALL"
      - name: limit
        type: integer
        description: "Max results (default: 500)"
        required: false
        default: 500
        min: 1
        max: 5000
    statement: |
      SELECT 'CALLS' AS section,
        CALLED_OBJCT AS name,
        FROM_PROC AS detail_1,
        CALLED_PROC AS detail_2,
        CAST(CALL_SEQ AS VARCHAR(50)) AS detail_3
      FROM ${IA_LIBRARY}.IAPGMCALLS
      WHERE MBR_NAME = :program_name
        AND (:section = '*ALL' OR :section = 'CALLS')

      UNION ALL

      SELECT 'FILES' AS section,
        REFERENCED_OBJ AS name,
        REFERENCED_OBJTYP AS detail_1,
        MAPED_FROM AS detail_2,
        '' AS detail_3
      FROM ${IA_LIBRARY}.IAALLREFPF
      WHERE OBJECT_NAME = :program_name
        AND REFERENCED_OBJTYP = '*FILE'
        AND (:section = '*ALL' OR :section = 'FILES')

      UNION ALL

      SELECT 'SUBROUTINES' AS section,
        SR_SBR_NAME AS name,
        SR_OPCODE AS detail_1,
        CAST(SR_CNT AS VARCHAR(50)) AS detail_2,
        CAST(MBR_RRN AS VARCHAR(50)) AS detail_3
      FROM ${IA_LIBRARY}.IASUBRDTL
      WHERE MBR_NAME = :program_name
        AND (:section = '*ALL' OR :section = 'SUBROUTINES')

      UNION ALL

      SELECT 'VARIABLES' AS section,
        IAV_VAR AS name,
        IAV_TYP AS detail_1,
        IAV_DTYP AS detail_2,
        CAST(IAV_LEN AS VARCHAR(50)) AS detail_3
      FROM ${IA_LIBRARY}.IAPGMVARS
      WHERE IAV_MBR = :program_name
        AND (:section = '*ALL' OR :section = 'VARIABLES')

      UNION ALL

      SELECT 'OVERRIDES' AS section,
        IOVR_FROM AS name,
        IOVR_TO AS detail_1,
        IOVR_SCP AS detail_2,
        CAST(IOVR_RRN AS VARCHAR(50)) AS detail_3
      FROM ${IA_LIBRARY}.IAOVRPF
      WHERE IOVR_MBR = :program_name
        AND (:section = '*ALL' OR :section = 'OVERRIDES')

      UNION ALL

      SELECT 'CALL_PARAMS' AS section,
        CALLED_OBJECT AS name,
        PARM_NAME AS detail_1,
        PARM_TYPE AS detail_2,
        CAST(CALL_SEQ AS VARCHAR(50)) AS detail_3
      FROM ${IA_LIBRARY}.IACALLPARM
      WHERE MBR_NAME = :program_name
        AND (:section = '*ALL' OR :section = 'CALL_PARAMS')

      ORDER BY section, name
      FETCH FIRST :limit ROWS ONLY

  # ── 14. Source Code — source member location ──────────────────────────────
  ia_source_code:
    name: ia-source-code
    source: ibmi
    description: >
      Get source member location and metadata from IASRCMBRID. Returns the
      source file, library, member type, and line counts. Use this to find
      where source code is stored before accessing it directly.
    parameters:
      - name: member_name
        type: string
        description: "Source member name (max 10)"
        required: true
        minLength: 1
        maxLength: 10
      - name: limit
        type: integer
        description: "Max results (default: 100)"
        required: false
        default: 100
        min: 1
        max: 1000
    statement: |
      SELECT
        MEMBER_NAME,
        MBR_SRC_PF AS source_file,
        MEMBER_LIB AS source_library,
        MEMBER_TYPE,
        MBR_TTL_LOC AS total_lines,
        MBR_CMT_LOC AS comment_lines,
        MBR_BLNK_LOC AS blank_lines
      FROM ${IA_LIBRARY}.IASRCMBRID
      WHERE MEMBER_NAME = :member_name
      ORDER BY MEMBER_NAME
      FETCH FIRST :limit ROWS ONLY

   # ── 15. RPG Source Tokens — token-level RPG source analysis ──────────────
  ia_rpg_source_tokens:
    name: ia-rpg-source-tokens
    source: ibmi
    maxDisplayRows: 1000
    description: >
      Get the token-level analysis of an RPG source member — every word/token
      categorized by the iA parser. This is the deepest level of RPG source
      analysis available. Queries IAPGMREF.
    parameters:
      - name: member_name
        type: string
        description: "Source member name"
        required: true
        minLength: 1
        maxLength: 10
      - name: offset
        type: integer
        description: "Skip first N rows for pagination (default: 0)"
        required: false
        default: 0
        min: 0
      - name: limit
        type: integer
        description: "Max results (default: 2000)"
        required: false
        default: 2000
        min: 1
        max: 10000
    statement: |
      SELECT *
      FROM ${IA_LIBRARY}.IAPGMREF
      WHERE MEMBER_NAME = :member_name
      ORDER BY SOURCE_RRN
      OFFSET :offset ROWS
      FETCH FIRST :limit ROWS ONLY

  # ── 16. CL Source Tokens — token-level CL source analysis ────────────────
  ia_cl_source_tokens:
    name: ia-cl-source-tokens
    source: ibmi
    description: >
      Get the token-level analysis of a CL source member — every word/token
      categorized by the iA parser. Queries IACPGMREF.
    parameters:
      - name: member_name
        type: string
        description: "Source member name"
        required: true
        minLength: 1
        maxLength: 10
      - name: offset
        type: integer
        description: "Skip first N rows for pagination (default: 0)"
        required: false
        default: 0
        min: 0
      - name: limit
        type: integer
        description: "Max results (default: 2000)"
        required: false
        default: 2000
        min: 1
        max: 10000
    statement: |
      SELECT *
      FROM ${IA_LIBRARY}.IACPGMREF
      WHERE MEMBER_NAME = :member_name
      ORDER BY SOURCE_RRN
      OFFSET :offset ROWS
      FETCH FIRST :limit ROWS ONLY

  # ── 17. Dashboard — repository health summary ─────────────────────────────
  ia_dashboard:
    name: ia-dashboard
    source: ibmi
    description: >
      Get the iA dashboard summary: member categories (compiled, unused, orphaned),
      line counts, and library mappings. Good overview of repository health.
      Queries IA_DASHBOARD_DETAIL.
    parameters:
      - name: limit
        type: integer
        description: "Max results (default: 500)"
        required: false
        default: 500
        min: 1
        max: 5000
    statement: |
      SELECT
        MEMBER_NAME, MEMBER_TYPE, MEMBER_CATEGORY,
        MEMBER_LINES, MEMBER_LIBRARY,
        OBJECT_LIBRARY
      FROM ${IA_LIBRARY}.IA_DASHBOARD_DETAIL
      ORDER BY MEMBER_TYPE, MEMBER_NAME
      FETCH FIRST :limit ROWS ONLY

  # ── 18. Repo Config — repository configuration settings ──────────────────
  ia_repo_config:
    name: ia-repo-config
    source: ibmi
    description: >
      Get the iA repository configuration settings (IFS locations, scan options, etc.).
      Queries REPO_CONFIGURATION.
    parameters: []
    statement: |
      SELECT KEY_NAME1, KEY_VALUE1
      FROM ${IA_LIBRARY}.REPO_CONFIGURATION

  # ── 19. Exception Log — parser error log ──────────────────────────────────
  ia_exception_log:
    name: ia-exception-log
    source: ibmi
    description: >
      View iA parser exceptions — useful for understanding why certain members
      may have incomplete analysis or missing cross-references.
      Pass '*ALL' for member_name to see all exceptions. Queries IAEXCPLOG.
    parameters:
      - name: member_name
        type: string
        description: "Filter by member name, or '*ALL' for all exceptions"
        required: false
        default: "*ALL"
        maxLength: 10
      - name: limit
        type: integer
        description: "Max results (default: 100)"
        required: false
        default: 100
        min: 1
        max: 5000
    statement: |
      SELECT *
      FROM ${IA_LIBRARY}.IAEXCPLOG
      WHERE (:member_name = '*ALL' OR PRS_SOURCE_SRC_MBR = :member_name)
      FETCH FIRST :limit ROWS ONLY

  # ── 20. DDS to DDL Status — conversion tracking ──────────────────────────
  ia_dds_to_ddl_status:
    name: ia-dds-to-ddl-status
    source: ibmi
    description: >
      View the status of DDS to DDL (SQL) file conversions tracked by iA.
      Shows which files have been converted, pending, and dependent programs.
      Queries DDSTODDL_FILE_CONVERSION_DETAILS.
    parameters:
      - name: limit
        type: integer
        description: "Max results (default: 200)"
        required: false
        default: 200
        min: 1
        max: 5000
    statement: |
      SELECT *
      FROM ${IA_LIBRARY}.DDSTODDL_FILE_CONVERSION_DETAILS
      ORDER BY 1
      FETCH FIRST :limit ROWS ONLY

  # ── 21. Reference Count — quick count of references by type ──────────────
  ia_reference_count:
    name: ia-reference-count
    source: ibmi
    description: >
      Get a quick count of how many objects reference a given object, grouped by
      object type. Lightweight alternative to ia_where_used when you only need
      the numbers, not the full list.
    parameters:
      - name: object_name
        type: string
        description: "Object name to count references for"
        required: true
        minLength: 1
        maxLength: 10
    statement: |
      SELECT
        REFERENCED_OBJ AS object_name,
        OBJECT_TYPE AS referencing_type,
        COUNT(*) AS reference_count
      FROM ${IA_LIBRARY}.IAALLREFPF
      WHERE REFERENCED_OBJ = :object_name
      GROUP BY REFERENCED_OBJ, OBJECT_TYPE
      ORDER BY reference_count DESC

  # ── 22. Unused Objects — dead code candidates ─────────────────────────────
  ia_unused_objects:
    name: ia-unused-objects
    source: ibmi
    description: >
      Find objects in the repository that are not referenced by any other object.
      Useful for identifying dead code candidates for cleanup.
    parameters:
      - name: object_type
        type: string
        description: "Filter by type (*ALL, *PGM, *SRVPGM, *FILE)"
        required: false
        default: "*ALL"
    statement: |
      SELECT
        od.OBJECT_NAME,
        od.OBJECT_TYPE,
        od.OBJECT_LIBRARY,
        od.CREATION_DATE
      FROM ${IA_LIBRARY}.OBJECT_DETAILS od
      LEFT JOIN ${IA_LIBRARY}.IAALLREFPF ref
        ON od.OBJECT_NAME = ref.REFERENCED_OBJ
      WHERE ref.REFERENCED_OBJ IS NULL
        AND (:object_type = '*ALL' OR od.OBJECT_TYPE = :object_type)
      ORDER BY od.OBJECT_TYPE, od.OBJECT_NAME
      FETCH FIRST 500 ROWS ONLY

  # ── 23. Circular Dependencies — detect circular call chains ──────────────
  ia_circular_deps:
    name: ia-circular-deps
    source: ibmi
    description: >
      Detect circular dependencies — programs that call each other directly
      or indirectly. These create maintenance risks and can cause infinite loops.
    parameters: []
    statement: |
      SELECT DISTINCT
        a.MBR_NAME AS program_a,
        a.CALLED_OBJCT AS program_b,
        'CIRCULAR' AS dependency_type
      FROM ${IA_LIBRARY}.IAPGMCALLS a
      JOIN ${IA_LIBRARY}.IAPGMCALLS b
        ON a.CALLED_OBJCT = b.MBR_NAME
        AND b.CALLED_OBJCT = a.MBR_NAME
      ORDER BY program_a

  # ── 24. Override Chain — chained OVRDBF dependencies ─────────────────────
  ia_override_chain:
    name: ia-override-chain
    source: ibmi
    description: >
      Find all file override chains — cases where file A is overridden to file B,
      which may itself be overridden to file C. These chains create hidden
      dependencies that are critical to understand.
    parameters: []
    statement: |
      SELECT
        a.IOVR_MBR AS member,
        a.IOVR_FROM AS original_file,
        a.IOVR_TO AS override_target,
        b.IOVR_TO AS chain_target,
        CASE WHEN b.IOVR_TO IS NOT NULL THEN 'CHAINED' ELSE 'DIRECT' END AS override_type
      FROM ${IA_LIBRARY}.IAOVRPF a
      LEFT JOIN ${IA_LIBRARY}.IAOVRPF b
        ON a.IOVR_TO = b.IOVR_FROM
        AND a.IOVR_MBR = b.IOVR_MBR
      ORDER BY a.IOVR_MBR, a.IOVR_FROM

  # ── 25. Object Lifecycle — creation, change, and last-used dates ─────────
  ia_object_lifecycle:
    name: ia-object-lifecycle
    source: ibmi
    description: >
      Get lifecycle metadata for an object: creation date/time, last change date/time,
      last-used date, days-used count, and object text. Use to understand how recently
      an object was modified or accessed — helpful for identifying stale objects or
      verifying deployment freshness. Queries IAOBJECT.
    parameters:
      - name: object_name
        type: string
        description: "IBM i object name (e.g., IASRV02SV, CUSTPGM)"
        required: true
        minLength: 1
        maxLength: 10
      - name: object_library
        type: string
        description: "Object library (e.g., #IAOBJ, MYLIB)"
        required: true
        minLength: 1
        maxLength: 10
      - name: object_type
        type: string
        description: "Object type (e.g., *MODULE, *PGM, *SRVPGM, *FILE, *CMD)"
        required: true
        minLength: 1
        maxLength: 10
      - name: limit
        type: integer
        description: "Max results (default: 200)"
        required: false
        default: 200
        min: 1
        max: 5000
    statement: |
      SELECT
        OBJECT_NAME,
        OBJECT_LIBRARY,
        OBJECT_TYPE,
        CREATION_DATE,
        CREATION_TIME,
        CHANGE_DATE,
        CHANGE_TIME,
        LASTUSED_DATE AS last_used_date,
        DAYS_USED_COUNT AS days_used,
        OBJECT_TEXT
      FROM ${IA_LIBRARY}.IAOBJECT
      WHERE OBJECT_NAME = :object_name
        AND OBJECT_LIBRARY = :object_library
        AND OBJECT_TYPE = :object_type
      ORDER BY OBJECT_NAME
      FETCH FIRST :limit ROWS ONLY

  # ── 26. Code Complexity — complexity metrics per source member ───────────
  ia_code_complexity:
    name: ia-code-complexity
    source: ibmi
    description: >
      Code complexity metrics per source member — IF/DO/SQL/GOTO/PROC counts,
      total and executable line counts, and call statistics. Use to identify the
      most complex, risky programs that need refactoring or extra testing.
      Queries IA_CODE_INFO.
    parameters:
      - name: member_name
        type: string
        description: "Source member name (e.g., IASRV01SV). Use '*ALL' to list all members."
        required: false
        default: "*ALL"
        maxLength: 10
      - name: limit
        type: integer
        description: "Max results (default: 200)"
        required: false
        default: 200
        min: 1
        max: 5000
    statement: |
      SELECT
        MEMBER_NAME,
        MEMBER_TYPE,
        SOURCE_FORMAT,
        TOTAL_LINES,
        EXEC_LINES,
        NON_EXEC_LINES,
        IF_COUNT,
        DO_COUNT,
        FOR_COUNT,
        SEL_COUNT AS select_count,
        WHEN_COUNT,
        AND_COUNT,
        OR_COUNT,
        ELSE_COUNT,
        SBR_COUNT AS subroutine_count,
        PROC_COUNT AS procedure_count,
        SQL_COUNT AS sql_statement_count,
        GOTO_COUNT,
        CAB_COUNT,
        CAS_COUNT,
        FILE_COUNT,
        DEVF_COUNT AS display_file_count,
        CALL_PGM_COUNT,
        CALLED_BY_PGM AS called_by_count,
        ALL_COUNT AS total_operations
      FROM ${IA_LIBRARY}.IA_CODE_INFO
      WHERE (:member_name = '*ALL' OR MEMBER_NAME = :member_name)
      ORDER BY TOTAL_LINES DESC
      FETCH FIRST :limit ROWS ONLY

  # ── 27. Library Files — list all files/tables in the iA library ──────────
  ia_library_files:
    name: ia-library-files
    source: ibmi
    description: >
      List all files and tables in the iA repository library.
      Shows file name, type (TABLE, VIEW, etc.), last altered date,
      and text description. Use this to discover available files before
      querying their schema or data.
      Queries QSYS2.SYSTABLES for the library configured in IA_LIBRARY.
    parameters:
      - name: file_type
        type: string
        description: "Filter by type: *ALL, TABLE, VIEW, PHYSICAL, LOGICAL (default: *ALL)"
        required: false
        default: "*ALL"
      - name: limit
        type: integer
        description: "Max results (default: 500)"
        required: false
        default: 500
        min: 1
        max: 5000
    statement: |
      SELECT
        TABLE_NAME AS file_name,
        TABLE_TYPE AS file_type,
        TABLE_TEXT AS description,
        LAST_ALTERED_TIMESTAMP AS last_altered
      FROM QSYS2.SYSTABLES
      WHERE TABLE_SCHEMA = '${IA_LIBRARY}'
        AND (:file_type = '*ALL' OR TABLE_TYPE = :file_type)
      ORDER BY TABLE_NAME
      FETCH FIRST :limit ROWS ONLY

  # ── 28. Object Lookup — find object type and library ──────────────────────
  ia_object_lookup:
    name: ia-object-lookup
    source: ibmi
    description: >
      Look up an object by name to find its type, library, and attribute.
      Queries IAOBJMAP (object-to-source mapping table).
      Supports % wildcards (e.g., %CUST%).
    parameters:
      - name: object_name
        type: string
        description: "Object name to look up (e.g., CUSTMAST). Use % for wildcards (e.g., %CUST%)."
        required: true
        minLength: 1
        maxLength: 10
      - name: limit
        type: integer
        description: "Max results (default: 200)"
        required: false
        default: 200
        min: 1
        max: 5000
    statement: |
      SELECT *
      FROM ${IA_LIBRARY}.IAOBJMAP
      WHERE RTRIM(OBJECT_NAME) LIKE :object_name
      ORDER BY OBJECT_NAME, OBJECT_TYPE
      FETCH FIRST :limit ROWS ONLY

  # ── 29. File Dependencies — logical files, indexes, views over a physical file ──
  ia_file_dependencies:
    name: ia-file-dependencies
    source: ibmi
    description: >
      Find all logical files, indexes, and SQL views that depend on a physical file.
      Essential for field change impact analysis — changes to a PF propagate to all
      dependent LFs, which in turn affect programs using those LFs.
      Queries IADSPDBR (DSPDBR output captured by iA).
    parameters:
      - name: file_name
        type: string
        description: "Physical file name (e.g., CUSTMAST)"
        required: true
        minLength: 1
        maxLength: 10
      - name: limit
        type: integer
        description: "Max results (default: 100)"
        required: false
        default: 100
        min: 1
        max: 1000
    statement: |
      SELECT
        WHRFI AS base_file,
        WHRLI AS base_library,
        WHREFI AS dependent_file,
        WHRELI AS dependent_library,
        CASE WHTYPE
          WHEN 'D' THEN 'DATA'
          WHEN 'I' THEN 'INDEX'
          WHEN 'O' THEN 'ACCESS_PATH_OWNER'
          WHEN 'V' THEN 'SQL_VIEW'
          WHEN 'C' THEN 'CONSTRAINT'
          ELSE WHTYPE
        END AS dependency_type,
        WHRTYP AS base_file_type
      FROM ${IA_LIBRARY}.IADSPDBR
      WHERE WHRFI = :file_name
      ORDER BY WHREFI
      FETCH FIRST :limit ROWS ONLY

  # ── 30. Uncompiled Sources — sources without compiled objects ────────────
  ia_uncompiled_sources:
    name: ia-uncompiled-sources
    source: ibmi
    description: >
      Find source members that have no corresponding compiled object.
      Useful for identifying dormant code, abandoned development, or sources
      that were never compiled. Complements ia_unused_objects (which finds
      compiled objects not referenced). Queries MEMBERLIST_DETAILS and IAOBJMAP.
    parameters:
      - name: member_type
        type: string
        description: "Filter by source type (*ALL, RPGLE, SQLRPGLE, CLLE, etc.)"
        required: false
        default: "*ALL"
      - name: limit
        type: integer
        description: "Max results (default: 500)"
        required: false
        default: 500
        min: 1
        max: 5000
    statement: |
      SELECT
        d.MEMBER_NAME,
        d.MEMBER_TYPE,
        d.SOURCE_FILE,
        d.SOURCE_LIBRARY,
        d.NUMBER_OF_RECORD AS LINE_COUNT,
        d.MBR_CHANGED_CENTURY || d.MBR_CHANGED_DATE AS LAST_CHANGED,
        d.MBR_DESCRIPTION
      FROM ${IA_LIBRARY}.MEMBERLIST_DETAILS d
      LEFT JOIN ${IA_LIBRARY}.IAOBJMAP m
        ON d.MEMBER_NAME = m.MEMBER_NAME
        AND d.MEMBER_TYPE = m.MEMBER_TYPE
      WHERE m.MEMBER_NAME IS NULL
        AND (:member_type = '*ALL' OR d.MEMBER_TYPE = :member_type)
      ORDER BY d.MEMBER_TYPE, d.MEMBER_NAME
      FETCH FIRST :limit ROWS ONLY

  # ── 31. Copybook Impact — find programs including a copybook ──────────────
  ia_copybook_impact:
    name: ia-copybook-impact
    source: ibmi
    description: >
      Find all source members that include a specific copybook via /COPY or /INCLUDE.
      Critical for understanding the blast radius of copybook changes — any modification
      to a copybook affects all including members. Shows the exact line number where
      the copy directive appears. Queries COPYBOOK_MEMBER_DETAIL.
    parameters:
      - name: copybook_name
        type: string
        description: "Copybook member name to search for (e.g., CUSTDS, ABORTERR)"
        required: true
        minLength: 1
        maxLength: 10
      - name: member_type
        type: string
        description: "Filter by including member type: *ALL, RPGLE, SQLRPGLE, CBLLE (default: *ALL)"
        required: false
        default: "*ALL"
      - name: limit
        type: integer
        description: "Max results (default: 500)"
        required: false
        default: 500
        min: 1
        max: 5000
    statement: |
      SELECT
        MEMBER_NAME AS including_member,
        MEMBER_TYPE AS member_type,
        MEMBER_LIBRARY AS member_library,
        MEMBER_SOURCE_FILE AS source_file,
        MEMBER_RRN_NUMBER AS copy_line_number,
        COPYBOOK_MEMBER_NAME AS copybook_name,
        COPYBOOK_MEMBER_LIBRARY AS copybook_library,
        COPYBOOK_SOURCE_FILE AS copybook_source_file,
        COPYBOOK_DIRECTIVES AS directive
      FROM ${IA_LIBRARY}.COPYBOOK_MEMBER_DETAIL
      WHERE COPYBOOK_MEMBER_NAME = :copybook_name
        AND (:member_type = '*ALL' OR MEMBER_TYPE = :member_type)
      ORDER BY MEMBER_LIBRARY, MEMBER_NAME
      FETCH FIRST :limit ROWS ONLY

  # ── 32. Service Program Exports — API surface discovery ──────────────────
  ia_srvpgm_exports:
    name: ia-srvpgm-exports
    source: ibmi
    description: >
      List all exported and imported procedures for a service program or module.
      Essential for understanding the API surface of a *SRVPGM — what procedures
      it exposes (EXPORT) and what external procedures it depends on (IMPORT).
      Queries IMPORTED_EXPORTED_PROCEDURE_DETAILS.
    parameters:
      - name: object_name
        type: string
        description: "Service program or module name"
        required: true
        minLength: 1
        maxLength: 10
      - name: procedure_type
        type: string
        description: "Filter by type: *ALL, EXPORT, IMPORT (default: *ALL)"
        required: false
        default: "*ALL"
      - name: limit
        type: integer
        description: "Max results (default: 200)"
        required: false
        default: 200
        min: 1
        max: 2000
    statement: |
      SELECT
        OBJECT_NAME,
        OBJECT_LIBRARY,
        OBJECT_TYPE,
        OBJECT_ATTRIBUTE,
        PROCEDURE_NAME,
        PROCEDURE_TYPE
      FROM ${IA_LIBRARY}.IMPORTED_EXPORTED_PROCEDURE_DETAILS
      WHERE OBJECT_NAME = :object_name
        AND (:procedure_type = '*ALL' OR PROCEDURE_TYPE = :procedure_type)
      ORDER BY PROCEDURE_TYPE, PROCEDURE_NAME
      FETCH FIRST :limit ROWS ONLY

  # ── 33. Procedure Cross-Reference — procedure-level call graph ───────────
  ia_procedure_xref:
    name: ia-procedure-xref
    source: ibmi
    description: >
      Find all procedures that call a specific procedure, or all procedures
      called by a specific procedure. More granular than ia_call_hierarchy —
      shows procedure-to-procedure relationships, not just program-to-program.
      Use for fine-grained impact analysis of procedure changes.
      Queries PROCEDURE_REFERENCE_DETAIL.
    parameters:
      - name: procedure_name
        type: string
        description: "Procedure name to analyze"
        required: true
        minLength: 1
        maxLength: 256
      - name: direction
        type: string
        description: "CALLERS (who calls this), CALLEES (what this calls), or BOTH (default: BOTH)"
        required: false
        default: "BOTH"
      - name: limit
        type: integer
        description: "Max results (default: 200)"
        required: false
        default: 200
        min: 1
        max: 2000
    statement: |
      SELECT
        'CALLERS' AS direction,
        OBJECT_NAME AS caller_object,
        OBJECT_LIBRARY AS caller_library,
        OBJECT_TYPE AS caller_type,
        PROCEDURE_NAME AS caller_procedure,
        REFERENCED_OBJECT_NAME AS target_object,
        REFERENCED_PROCEDURE_NAME AS target_procedure
      FROM ${IA_LIBRARY}.PROCEDURE_REFERENCE_DETAIL
      WHERE REFERENCED_PROCEDURE_NAME = :procedure_name
        AND :direction IN ('CALLERS', 'BOTH')
      UNION ALL
      SELECT
        'CALLEES' AS direction,
        OBJECT_NAME AS caller_object,
        OBJECT_LIBRARY AS caller_library,
        OBJECT_TYPE AS caller_type,
        PROCEDURE_NAME AS caller_procedure,
        REFERENCED_OBJECT_NAME AS target_object,
        REFERENCED_PROCEDURE_NAME AS target_procedure
      FROM ${IA_LIBRARY}.PROCEDURE_REFERENCE_DETAIL
      WHERE PROCEDURE_NAME = :procedure_name
        AND :direction IN ('CALLEES', 'BOTH')
      ORDER BY direction, caller_object
      FETCH FIRST :limit ROWS ONLY

  # ── 34. CL Job Submissions — batch job and scheduler detection ───────────
  ia_cl_jobs:
    name: ia-cl-jobs
    source: ibmi
    description: >
      Find SBMJOB and CALL commands in CL programs, including job queue,
      job description, and hold status. Critical for understanding batch
      job scheduling — programs invoked via SBMJOB may appear "unused" in
      simple cross-reference queries but are actually scheduler-invoked.
      Queries IAVARCAL.
    parameters:
      - name: member_name
        type: string
        description: "CL member name, or *ALL for all members"
        required: false
        default: "*ALL"
      - name: call_type
        type: string
        description: "Filter by type: *ALL, SBMJOB, DIRECT (default: *ALL)"
        required: false
        default: "*ALL"
      - name: limit
        type: integer
        description: "Max results (default: 500)"
        required: false
        default: 500
        min: 1
        max: 5000
    statement: |
      SELECT
        IVCAL_MBR AS cl_member,
        IVCAL_FILE AS source_file,
        IVCAL_LIB AS library,
        IVCAL_TYP AS call_type,
        IVCAL_PGM AS called_program,
        IVCAL_VARM AS variable_call,
        IVCAL_JOB AS job_name,
        IVCAL_JOBD AS job_description,
        IVCAL_JOBQ AS job_queue,
        IVCAL_HOLD AS hold_flag
      FROM ${IA_LIBRARY}.IAVARCAL
      WHERE (:member_name = '*ALL' OR IVCAL_MBR = :member_name)
        AND (:call_type = '*ALL' OR IVCAL_TYP = :call_type)
      ORDER BY IVCAL_MBR, IVCAL_TYP
      FETCH FIRST :limit ROWS ONLY

  # ── 35. Procedure Parameters — PR/PI signatures ──────────────────────────
  ia_procedure_params:
    name: ia-procedure-params
    source: ibmi
    description: >
      Get the parameter signature of a procedure — parameter names, types,
      keywords (CONST, VALUE, OPTIONS), and sequence. Shows both PR (prototype)
      and PI (procedure interface) declarations. Essential for understanding
      how to call a procedure correctly. Queries IAPRCPARM.
    parameters:
      - name: procedure_name
        type: string
        description: "Procedure name to look up"
        required: true
        minLength: 1
        maxLength: 256
      - name: member_name
        type: string
        description: "Filter by source member name (optional)"
        required: false
        default: "*ALL"
      - name: limit
        type: integer
        description: "Max results (default: 100)"
        required: false
        default: 100
        min: 1
        max: 1000
    statement: |
      SELECT
        MEMBER_NAME,
        PROCEDURE_NAME,
        PR_PI_FLAG AS declaration_type,
        PARAMETER_SEQ AS param_sequence,
        PARAMETER_NAME AS param_name,
        PARM_DATA_TYPE AS data_type,
        PARM_LENGHT AS param_length,
        PARM_DEC_POS AS decimal_positions,
        KEYWORDS
      FROM ${IA_LIBRARY}.IAPRCPARM
      WHERE PROCEDURE_NAME = :procedure_name
        AND (:member_name = '*ALL' OR MEMBER_NAME = :member_name)
      ORDER BY MEMBER_NAME, PR_PI_FLAG, PARAMETER_SEQ
      FETCH FIRST :limit ROWS ONLY

  # ── 36. Variable Operations — assignments, declarations, BIFs ────────────
  ia_variable_ops:
    name: ia-variable-ops
    source: ibmi
    maxDisplayRows: 1000
    description: >
      Find all operations involving a variable — declarations (DCL-DS, DCLVAR),
      assignments (EVAL), comparisons, and BIF usage. Useful for tracing data
      flow and understanding how a variable is used throughout a program.
      Queries IAVARREL.
    parameters:
      - name: member_name
        type: string
        description: "Source member name"
        required: true
        minLength: 1
        maxLength: 10
      - name: variable_name
        type: string
        description: "Variable name to search for, or *ALL for all variables"
        required: false
        default: "*ALL"
      - name: opcode
        type: string
        description: "Filter by opcode: *ALL, DCL-DS, DCLVAR, EVAL, etc. (default: *ALL)"
        required: false
        default: "*ALL"
      - name: limit
        type: integer
        description: "Max results (default: 500)"
        required: false
        default: 500
        min: 1
        max: 5000
    statement: |
      SELECT
        MEMBER_NAME,
        OPCODE_NAME AS opcode,
        FACTOR1_VAL AS factor1,
        FACTOR2_VAL AS factor2,
        RESULT_VAL AS result,
        BIF AS builtin_function
      FROM ${IA_LIBRARY}.IAVARREL
      WHERE MEMBER_NAME = :member_name
        AND (:variable_name = '*ALL'
             OR FACTOR1_VAL = :variable_name
             OR FACTOR2_VAL = :variable_name
             OR RESULT_VAL = :variable_name)
        AND (:opcode = '*ALL' OR OPCODE_NAME = :opcode)
      ORDER BY MEMBER_NAME
      FETCH FIRST :limit ROWS ONLY

  # ── 37. Key List Usage — KLIST/KFLD definitions ──────────────────────────
  ia_klist_usage:
    name: ia-klist-usage
    source: ibmi
    description: >
      Find KLIST (key list) definitions and their KFLD (key field) components.
      Shows how programs build composite keys for CHAIN, SETLL, SETGT operations.
      Understanding key field usage helps analyze file access patterns.
      Queries IAPGMKLIST.
    parameters:
      - name: member_name
        type: string
        description: "Source member name, or *ALL for all members"
        required: false
        default: "*ALL"
      - name: klist_name
        type: string
        description: "Key list name to search for, or *ALL"
        required: false
        default: "*ALL"
      - name: limit
        type: integer
        description: "Max results (default: 500)"
        required: false
        default: 500
        min: 1
        max: 5000
    statement: |
      SELECT
        MEMBER_NAME,
        LIBRARY_NAME,
        SRC_PF_NAME AS source_file,
        KLIST_NAME,
        KFLD_NAME AS key_field
      FROM ${IA_LIBRARY}.IAPGMKLIST
      WHERE (:member_name = '*ALL' OR MEMBER_NAME = :member_name)
        AND (:klist_name = '*ALL' OR KLIST_NAME = :klist_name)
      ORDER BY MEMBER_NAME, KLIST_NAME
      FETCH FIRST :limit ROWS ONLY

  # ── 38. Application Areas — scoped project analysis ──────────────────────
  ia_application_area:
    name: ia-application-area
    source: ibmi
    description: >
      List application areas (named project scopes) and optionally the objects
      in each area. Use *LIST to see all defined areas, or provide an area name
      to see its objects. Application areas enable scoped impact analysis —
      filter queries to a specific project or subsystem.
      Queries APPLICATION_AREA_HEADER and APPLICATION_AREA_OBJECT_DETAILS.
    parameters:
      - name: area_name
        type: string
        description: "Application area name, or *LIST to list all areas"
        required: false
        default: "*LIST"
      - name: object_type
        type: string
        description: "Filter objects by type: *ALL, *PGM, *SRVPGM, *FILE (default: *ALL)"
        required: false
        default: "*ALL"
      - name: limit
        type: integer
        description: "Max results (default: 500)"
        required: false
        default: 500
        min: 1
        max: 5000
    statement: |
      SELECT
        h.APP_AREA_NAME AS area_name,
        h.APP_AREA_DESC AS description,
        COALESCE(d.OBJECT_NAME, '') AS object_name,
        COALESCE(d.OBJECT_TYPE, '') AS object_type,
        h.CREATED_USER AS created_by,
        h.CREATED_TIMESTAMP AS created_on
      FROM ${IA_LIBRARY}.APPLICATION_AREA_HEADER h
      LEFT JOIN ${IA_LIBRARY}.APPLICATION_AREA_OBJECT_DETAILS d
        ON h.APP_AREA_NAME = d.APP_AREA_NAME
        AND (:area_name != '*LIST')
      WHERE (:area_name = '*LIST' OR h.APP_AREA_NAME = :area_name)
        AND (:object_type = '*ALL' OR d.OBJECT_TYPE = :object_type OR d.OBJECT_TYPE IS NULL)
      ORDER BY h.APP_AREA_NAME, d.OBJECT_TYPE, d.OBJECT_NAME
      FETCH FIRST :limit ROWS ONLY

  # ── 39. SQL Name Mapping — long/short name resolution ────────────────────
  ia_sql_names:
    name: ia-sql-names
    source: ibmi
    description: >
      Resolve SQL long names to IBM i short names and vice versa. SQL procedures
      and functions often have cryptic 10-character system names (like STORE00001)
      that map to readable long names (like STORE_PRC_LONG_NAME). This tool helps
      navigate between naming conventions. Queries IA_LONG_SHORT_NAME.
    parameters:
      - name: name_pattern
        type: string
        description: "Name to search for (supports % wildcards) - searches both long and short names"
        required: true
        minLength: 1
        maxLength: 128
      - name: routine_type
        type: string
        description: "Filter by type: *ALL, PROCEDURE, FUNCTION (default: *ALL)"
        required: false
        default: "*ALL"
      - name: limit
        type: integer
        description: "Max results (default: 100)"
        required: false
        default: 100
        min: 1
        max: 1000
    statement: |
      SELECT
        ROUTINE_NAME AS sql_long_name,
        EXTERNAL_NAME AS system_short_name,
        SPECIFIC_NAME,
        ROUTINE_TYPE,
        ROUTINE_BODY,
        ROUTINE_LIBRARY,
        EXTERNAL_LIBRARY,
        LANGUAGE,
        SOURCE_MEMBER,
        SOURCE_FILE
      FROM ${IA_LIBRARY}.IA_LONG_SHORT_NAME
      WHERE (ROUTINE_NAME LIKE :name_pattern
             OR EXTERNAL_NAME LIKE :name_pattern
             OR SOURCE_MEMBER LIKE :name_pattern)
        AND (:routine_type = '*ALL' OR ROUTINE_TYPE = :routine_type)
      ORDER BY ROUTINE_NAME
      FETCH FIRST :limit ROWS ONLY

  # ── 40. Program Files — file usage with prefix/rename details ────────────
  ia_program_files:
    name: ia-program-files
    source: ibmi
    description: >
      List all files used by a program, including PREFIX keyword mapping,
      renamed files, and record format details. More detailed than ia_where_used
      for understanding exactly how a program accesses its files.
      Queries PROGRAM_TO_FILE_MAPPING_DETAILS.
    parameters:
      - name: member_name
        type: string
        description: "Source member name"
        required: true
        minLength: 1
        maxLength: 10
      - name: limit
        type: integer
        description: "Max results (default: 100)"
        required: false
        default: 100
        min: 1
        max: 1000
    statement: |
      SELECT
        MEMBER_NAME,
        MEMBER_TYPE,
        LIBRARY,
        SOURCE_FILE,
        ACTUAL_FILE AS file_name,
        RENAMED_FILE,
        PREFIX,
        ACTUAL_RCDFMT_NAME AS record_format,
        RENAMED_RCDFMT_NAME AS renamed_format,
        QUALIFIED_LIBRARY,
        EXTERNAL_MEMBER_NAME,
        FILEINFO_DATASTR AS file_info_ds,
        INDICATOR_DATASTR AS indicator_ds
      FROM ${IA_LIBRARY}.PROGRAM_TO_FILE_MAPPING_DETAILS
      WHERE MEMBER_NAME = :member_name
      ORDER BY ACTUAL_FILE
      FETCH FIRST :limit ROWS ONLY

  # ── 41. RPG Source Code — read RPG source lines ──────────────────────────
  ia_rpg_source:
    name: ia-rpg-source
    source: ibmi
    maxDisplayRows: 1000
    description: >
      Read the actual RPG source code for a member, line by line.
      Returns source text with line numbers, spec types, and format classification.
      Optionally filter by RPG specification type (C, D, F, H, I, O, P) to see
      only calc specs, definitions, file declarations, etc.
      Queries IAQRPGSRC. Use ia_source_code for member metadata (location, line counts).
    parameters:
      - name: member_name
        type: string
        description: "RPG source member name (e.g., CUSTMAST, ORDENT01)"
        required: true
        minLength: 1
        maxLength: 10
      - name: source_spec
        type: string
        description: "Filter by RPG spec type: C (calc), D (definition), F (file), H (header), I (input), O (output), P (procedure), or *ALL (default: *ALL)"
        required: false
        default: "*ALL"
      - name: library_name
        type: string
        description: "Filter by source library, or *ALL for all libraries (default: *ALL)"
        required: false
        default: "*ALL"
        maxLength: 10
      - name: offset
        type: integer
        description: "Skip first N lines for pagination (default: 0). Use with limit to page through large sources."
        required: false
        default: 0
        min: 0
      - name: limit
        type: integer
        description: "Max source lines to return (default: 5000)"
        required: false
        default: 5000
        min: 1
        max: 10000
    statement: |
      SELECT
        LIBRARY_NAME, SOURCEPF_NAME, MEMBER_NAME, MEMBER_TYPE,
        SOURCE_RRN, SOURCE_SEQ, SOURCE_SPEC,
        SRCLIN_TYPE, SOURCE_DATA
      FROM ${IA_LIBRARY}.IAQRPGSRC
      WHERE MEMBER_NAME = :member_name
        AND (:source_spec = '*ALL' OR SOURCE_SPEC = :source_spec)
        AND (:library_name = '*ALL' OR LIBRARY_NAME = :library_name)
      ORDER BY LIBRARY_NAME, SOURCE_RRN
      OFFSET :offset ROWS
      FETCH FIRST :limit ROWS ONLY

  # ── 42. RPG Source Search — cross-member keyword search ──────────────────
  ia_rpg_source_search:
    name: ia-rpg-source-search
    source: ibmi
    maxDisplayRows: 1000
    description: >
      Search across all RPG source members for lines containing a keyword or pattern.
      Case-insensitive. Use this to find embedded SQL table references, API calls
      (QCMDEXC, system APIs), hardcoded values, deprecated features (GOTO),
      or any text pattern across the RPG codebase. Queries IAQRPGSRC.
    parameters:
      - name: search_text
        type: string
        description: "Text to search for in source lines (case-insensitive)"
        required: true
        minLength: 1
      - name: member_name
        type: string
        description: "Limit search to a specific member, or *ALL (default: *ALL)"
        required: false
        default: "*ALL"
        maxLength: 10
      - name: member_type
        type: string
        description: "Filter by member type: SQLRPGLE, RPGLE, RPG, or *ALL (default: *ALL)"
        required: false
        default: "*ALL"
        maxLength: 10
      - name: limit
        type: integer
        description: "Max matching lines to return (default: 500)"
        required: false
        default: 500
        min: 1
        max: 2000
    statement: |
      SELECT
        MEMBER_NAME, LIBRARY_NAME, MEMBER_TYPE,
        SOURCE_RRN, SOURCE_DATA
      FROM ${IA_LIBRARY}.IAQRPGSRC
      WHERE UPPER(SOURCE_DATA) LIKE '%' || UPPER(:search_text) || '%'
        AND (:member_name = '*ALL' OR MEMBER_NAME = :member_name)
        AND (:member_type = '*ALL' OR MEMBER_TYPE = :member_type)
      ORDER BY MEMBER_NAME, SOURCE_RRN
      FETCH FIRST :limit ROWS ONLY

  # ── 43. RPG Source Stats — modernization metrics and cross-library comparison ─
  ia_rpg_source_stats:
    name: ia-rpg-source-stats
    source: ibmi
    description: >
      Get source format statistics per RPG member: free-format vs fixed-format line counts,
      comment-to-code ratio, and modernization readiness percentage. When a member exists
      in multiple libraries, each library appears as a separate row for cross-library
      comparison. Run with member_name=*ALL for a full portfolio modernization dashboard.
      Queries IAQRPGSRC. SRCLIN_TYPE codes: FFR/FFC = free-format code, FX3/FX4 = fixed-format
      code, 4-char types (FFRC, FX3C, etc.) = comments/templates.
    parameters:
      - name: member_name
        type: string
        description: "Member name, or *ALL for portfolio-wide stats (default: *ALL)"
        required: false
        default: "*ALL"
        maxLength: 10
      - name: library_name
        type: string
        description: "Filter by library, or *ALL (default: *ALL)"
        required: false
        default: "*ALL"
        maxLength: 10
      - name: limit
        type: integer
        description: "Max rows to return (default: 500)"
        required: false
        default: 500
        min: 1
        max: 5000
    statement: |
      SELECT
        MEMBER_NAME, LIBRARY_NAME, MEMBER_TYPE,
        COUNT(*) AS TOTAL_LINES,
        SUM(CASE WHEN SRCLIN_TYPE LIKE 'FF%' THEN 1 ELSE 0 END) AS FREE_FORMAT_LINES,
        SUM(CASE WHEN SRCLIN_TYPE LIKE 'FX%' THEN 1 ELSE 0 END) AS FIXED_FORMAT_LINES,
        SUM(CASE WHEN SRCLIN_TYPE IN ('FFR', 'FFC', 'FX3', 'FX4') THEN 0 ELSE 1 END) AS COMMENT_LINES,
        SUM(CASE WHEN SRCLIN_TYPE IN ('FFR', 'FFC', 'FX3', 'FX4') THEN 1 ELSE 0 END) AS CODE_LINES,
        CASE WHEN COUNT(*) > 0
          THEN DEC(SUM(CASE WHEN SRCLIN_TYPE LIKE 'FF%' THEN 1 ELSE 0 END) * 100.0 / COUNT(*), 5, 1)
          ELSE 0 END AS FREE_FORMAT_PCT
      FROM ${IA_LIBRARY}.IAQRPGSRC
      WHERE (:member_name = '*ALL' OR MEMBER_NAME = :member_name)
        AND (:library_name = '*ALL' OR LIBRARY_NAME = :library_name)
      GROUP BY MEMBER_NAME, LIBRARY_NAME, MEMBER_TYPE
      ORDER BY MEMBER_NAME, LIBRARY_NAME
      FETCH FIRST :limit ROWS ONLY

  # ── 44. Member Lookup — source member metadata and existence check ────────
  ia_member_lookup:
    name: ia-member-lookup
    source: ibmi
    description: >
      Look up source member metadata: file location, type, description, record counts,
      and creation/change/usage timestamps. Use this to verify member existence before
      querying other tools, or to get member details. Supports % wildcards.
      Queries IAMEMBER (member list details table).
    parameters:
      - name: member_name
        type: string
        description: "Member name to look up (e.g., ORDENT00). Use % for wildcards (e.g., ORD%)."
        required: true
        minLength: 1
        maxLength: 10
      - name: source_file
        type: string
        description: "Source file name filter, or *ALL (default: *ALL)"
        required: false
        default: "*ALL"
        maxLength: 10
      - name: source_library
        type: string
        description: "Source library filter, or *ALL (default: *ALL)"
        required: false
        default: "*ALL"
        maxLength: 10
      - name: member_type
        type: string
        description: "Member type filter (e.g., RPGLE, SQLRPGLE, CLLE), or *ALL (default: *ALL)"
        required: false
        default: "*ALL"
        maxLength: 10
      - name: limit
        type: integer
        description: "Max rows to return (default: 200)"
        required: false
        default: 200
        min: 1
        max: 5000
    statement: |
      SELECT
        MEMBER_NAME, SOURCE_FILE, SOURCE_LIBRARY, IFS_LOCATION,
        MEMBER_TYPE, MEMBER_TYPE_S38, MBR_DESCRIPTION,
        NUMBER_OF_RECORD, NUMBER_OF_DELETED_RECORD,
        MBR_CREATION_CENTURY || MBR_CREATION_DATE AS CREATED_DATE,
        MBR_CREATION_TIME AS CREATED_TIME,
        MBR_CHANGED_CENTURY || MBR_CHANGED_DATE AS CHANGED_DATE,
        MBR_CHANGED_TIME AS CHANGED_TIME,
        LAST_USED_CENTURY || LAST_USED_DATE AS LAST_USED_DATE,
        DAYS_USED_COUNT
      FROM ${IA_LIBRARY}.IAMEMBER
      WHERE MEMBER_NAME LIKE :member_name
        AND (:source_file = '*ALL' OR SOURCE_FILE = :source_file)
        AND (:source_library = '*ALL' OR SOURCE_LIBRARY = :source_library)
        AND (:member_type = '*ALL' OR MEMBER_TYPE = :member_type)
      ORDER BY MEMBER_NAME, SOURCE_LIBRARY, SOURCE_FILE
      FETCH FIRST :limit ROWS ONLY

  # ── 45. Object References — what an object references/contains ────────────
  ia_object_references:
    name: ia-object-references
    source: ibmi
    maxDisplayRows: 1000
    description: >
      Find all objects that a given object references, uses, or contains.
      Inverse of ia_where_used: shows what an object depends ON rather than
      what depends on IT. Use cases: modules bound into *PGM/*SRVPGM,
      service programs in a *BNDDIR, files used by a program, etc.
      Queries the iA IAALLREFPF cross-reference table.
    parameters:
      - name: object_name
        type: string
        description: "Object name to find references FROM (e.g., IABNDDIR, MYPGM)"
        required: true
        minLength: 1
        maxLength: 10
      - name: referenced_type
        type: string
        description: "Filter referenced objects by type: *ALL, *MODULE, *SRVPGM, *FILE, *PGM, *BNDDIR, *DTAARA (default: *ALL)"
        required: false
        default: "*ALL"
      - name: limit
        type: integer
        description: "Max results (default: 200)"
        required: false
        default: 200
        min: 1
        max: 5000
    statement: |
      SELECT DISTINCT
        OBJECT_NAME AS source_object,
        OBJECT_TYPE AS source_type,
        OBJECT_ATTR AS source_attr,
        REFERENCED_OBJ AS referenced_object,
        REFERENCED_OBJTYP AS referenced_type,
        REFERENCED_OBJLIB AS referenced_library,
        MAPED_FROM AS reference_source
      FROM ${IA_LIBRARY}.IAALLREFPF
      WHERE OBJECT_NAME = :object_name
        AND (:referenced_type = '*ALL' OR REFERENCED_OBJTYP = :referenced_type)
      ORDER BY REFERENCED_OBJTYP, REFERENCED_OBJ
      FETCH FIRST :limit ROWS ONLY
